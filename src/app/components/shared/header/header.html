<header>
  <div class="h-16 px-8 flex relative items-center justify-between w-full text-primary fill-primary bg-background">
    <a routerLink="/" (click)="SwitchShowProfileMenu(false)" class="flex flex-row items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" class="h-10 w-auto"><path d="M360-500v-60h240v60H360Zm40 120v-60h160v60H400Zm20-420h120-120Zm0 640h120-120Zm-60 80-54-182q-48-38-77-95t-29-123q0-66 29-123t77-95l54-182h240l54 182q48 38 77 95t29 123q0 66-29 123t-77 95L600-80H360Zm120-200q83 0 141.5-58.5T680-480q0-83-58.5-141.5T480-680q-83 0-141.5 58.5T280-480q0 83 58.5 141.5T480-280Zm-76-470q20-5 38.5-8t37.5-3q19 0 37.5 3t38.5 8l-16-50H420l-16 50Zm16 590h120l16-50q-20 5-38.5 7.5T480-200q-19 0-37.5-2.5T404-210l16 50Z"/></svg>
      <h1 class="font-semibold italic">Itemite</h1>
    </a>
    <div class="flex justify-center items-center">
      <app-combo-box [items]="languages" [selectedItem]="selectedLanguage()" (selectedItemChange)="useLanguage($event)"
                     class="w-24 text-2xl mx-2"/>
      <a routerLink="/followed-products">
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" class="h-10 w-auto"><path d="m480-120-58-52q-101-91-167-157T150-447.5Q111-500 95.5-544T80-634q0-94 63-157t157-63q52 0 99 22t81 62q34-40 81-62t99-22q94 0 157 63t63 157q0 46-15.5 90T810-447.5Q771-395 705-329T538-172l-58 52Zm0-108q96-86 158-147.5t98-107q36-45.5 50-81t14-70.5q0-60-40-100t-100-40q-47 0-87 26.5T518-680h-76q-15-41-55-67.5T300-774q-60 0-100 40t-40 100q0 35 14 70.5t50 81q36 45.5 98 107T480-228Zm0-273Z"/></svg>
      </a>
      <div (click)="OnProfileIconClicked()" class="hover:cursor-pointer relative flex">
        @if (notificationCountClamped() > 0) {
          <div class="absolute font-mono aspect-square z-2 p-px w-fit h-fit justify-self-end flex items-center justify-center inset-0 bg-destructive rounded-full text-destructive-foreground"
               [class.min-h-fit]="!increaseFontSize()"
               [class.min-h-4]="increaseFontSize()"
          >
            <p> {{notificationCountClamped()}} </p>
          </div>
        }
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" class="h-10 w-auto"><path d="M480-480q-66 0-113-47t-47-113q0-66 47-113t113-47q66 0 113 47t47 113q0 66-47 113t-113 47ZM160-160v-112q0-34 17.5-62.5T224-378q62-31 126-46.5T480-440q66 0 130 15.5T736-378q29 15 46.5 43.5T800-272v112H160Zm80-80h480v-32q0-11-5.5-20T700-306q-54-27-109-40.5T480-360q-56 0-111 13.5T260-306q-9 5-14.5 14t-5.5 20v32Zm240-320q33 0 56.5-23.5T560-640q0-33-23.5-56.5T480-720q-33 0-56.5 23.5T400-640q0 33 23.5 56.5T480-560Zm0-80Zm0 400Z"/></svg>
      </div>
    </div>
    @if (showProfileMenu()) {
      <div
        [class.opacity-0]="playHideAnim()"
        [class.scale-y-0]="playHideAnim()"
        class="opacityIn origin-top absolute inset-0 w-xs md:w-55 max-w-2/3 top-16 justify-self-end
      bg-linear-to-r from-background/20 to-background/80 h-dvh md:h-fit backdrop-blur-2xl transition-all duration-200"
      >
        <app-on-profile-menu [visible]="showProfileMenu()" (onClose)="SwitchShowProfileMenu()" />
      </div>
    }
  </div>
</header>
