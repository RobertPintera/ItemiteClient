<div class="combo-container">
  <button class="combo-selected w-full" (click)="toggleDropdown()">
    <p>{{ selected()?.value ?? ' ' }}</p>
    <span class="arrow">▼</span>
  </button>
  @if(isOpen()){
    <ul class="combo-dropdown w-full">
      @for (item of items(); track item.key){
        <li class="h-full w-full">
          <button (click)="chooseItem(item); $event.stopPropagation()" class="w-full h-full text-left p-2">{{ item.value }}</button>
        </li>
      }
    </ul>
  }
</div>
