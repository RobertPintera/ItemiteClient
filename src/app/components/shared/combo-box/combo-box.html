<div class="combo-container" (click)="toggleDropdown()">
  <div class="combo-selected">
    <p>{{ selected()?.value ?? ' ' }}</p>
    <span class="arrow">▼</span>
  </div>
  @if(isOpen()){
    <ul class="combo-dropdown">
      @for (item of items(); track item.key){
        <li (click)="chooseItem(item); $event.stopPropagation()">
          {{ item.value }}
        </li>
      }
    </ul>
  }
</div>
