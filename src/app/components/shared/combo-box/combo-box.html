<button class="combo-selected w-full" (click)="toggleDropdown()">
  @if (templateRef){
    <span><ng-container [ngTemplateOutlet]="templateRef" [ngTemplateOutletContext]="{ $implicit: selected() }"></ng-container></span>
  } @else {
    <span>{{ selected()?.value ?? ' ' }}</span>
  }
  <span class="arrow">▼</span>
</button>
@if(isOpen()){
  <ul class="combo-dropdown w-full">
    @for (item of items(); track item.key){
      <li class="flex items-center h-full w-full min-h-12">
        <button (click)="chooseItem(item); $event.stopPropagation()" class="w-full h-full text-left p-2 ">
          @if (templateRef){
            <span><ng-container [ngTemplateOutlet]="templateRef" [ngTemplateOutletContext]="{ $implicit: item }"> </ng-container></span>
          } @else {
            <span>{{ item.value }}</span>
          }
        </button>
      </li>
    }
  </ul>
}
