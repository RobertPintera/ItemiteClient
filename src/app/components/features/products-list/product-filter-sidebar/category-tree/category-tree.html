<ul class="flex w-full" [ngClass]="{
    'flex-row gap-16 flex-wrap xl:flex xl:flex-col xl:gap-0': level() === 0,
    'flex-col gap-0': level() !== 0
  }">
  @for (category of categories(); track category.id) {
    <li class="flex-1 w-full" [style.padding-left.px]="level() * 20">
      <div class="flex pb-2 gap-2">
        <input type="checkbox"/>
        <p>{{ category.name }}</p>
      </div>
      @if (category.subcategories?.length) {
        <ng-container
          *ngTemplateOutlet="
            treeTemplate;
            context: { $implicit: category.subcategories, level: level() + 1 }
          "
        ></ng-container>
      }
    </li>
  }
</ul>

<ng-template #treeTemplate let-categories let-level="level">
  <ul
    [ngClass]="{
      'flex flex-row gap-0 xl:flex-col': level === 0,
      'flex flex-col gap-2': level !== 0
    }"
  >
    @for (category of categories; track category.id) {
      <li [style.padding-left.px]="level * 20">
        <div class="flex pb-2 gap-2">
          <input type="checkbox" />
          <p>{{ category.name }}</p>
        </div>

        @if (category.subcategories?.length) {
          <ng-container
            *ngTemplateOutlet="
              treeTemplate;
              context: { $implicit: category.subcategories, level: level + 1 }
            "
          ></ng-container>
        }
      </li>
    }
  </ul>
</ng-template>
