<div class="flex min-h-[calc(100vh-32*var(--spacing))] flex-col w-full">
  @if (!productId()) {
    <div class="h-12 bg-linear-to-r/oklab from-primary/80 to-background
      text-white text-xl items-center flex p-2 gap-2 shadow-xl"
    >
      <!-- sm:hidden -->
      <button
        (click)="SwitchView()"
        class="hover:cursor-pointer
        sm:w-auto sm:justify-start sm:hidden
        w-full justify-center flex
        bg-linear-to-r/oklab from-transparent to-primary
        flex-row items-center gap-1
        rounded-md inset-ring-b-2 inset-ring-background p-2"
      >
        @if (viewAs()==="Seller") {
          <p class="w-full">
            {{"chats_main.messages" | translate}} - {{"chats_main.you_sell" | translate}}
          </p>
        } @else {
          <p class="w-full">
            {{"chats_main.messages" | translate}} - {{"chats_main.you_buy" | translate}}
          </p>
        }
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
          <path fill-rule="evenodd" d="M15.97 2.47a.75.75 0 0 1 1.06 0l4.5 4.5a.75.75 0 0 1 0 1.06l-4.5 4.5a.75.75 0 1 1-1.06-1.06l3.22-3.22H7.5a.75.75 0 0 1 0-1.5h11.69l-3.22-3.22a.75.75 0 0 1 0-1.06Zm-7.94 9a.75.75 0 0 1 0 1.06l-3.22 3.22H16.5a.75.75 0 0 1 0 1.5H4.81l3.22 3.22a.75.75 0 1 1-1.06 1.06l-4.5-4.5a.75.75 0 0 1 0-1.06l4.5-4.5a.75.75 0 0 1 1.06 0Z" clip-rule="evenodd" />
        </svg>
      </button>

      <button
        (click)="Select('Seller')"
        [class.to-primary]="viewAs()!=='Seller'"
        [class.to-secondary]="viewAs()==='Seller'"
        [class.underline]="viewAs()==='Seller'"
        [class.ring-2]="viewAs()==='Seller'"
        class="hover:cursor-pointer
        sm:w-auto sm:justify-start sm:flex
        w-full justify-center hidden
        bg-linear-to-r/oklab from-primary
        flex-row items-center gap-1
        rounded-md inset-ring-b-2 inset-ring-background p-2"
      >
        <p class="w-full">
          {{"chats_main.messages" | translate}} - {{"chats_main.you_sell" | translate}}
        </p>
      </button>
      <button
        (click)="Select('Buyer')"
        [class.to-primary]="viewAs()!=='Buyer'"
        [class.to-secondary]="viewAs()==='Buyer'"
        [class.underline]="viewAs()==='Buyer'"
        [class.ring-2]="viewAs()==='Buyer'"
        class="hover:cursor-pointer
        sm:w-auto sm:justify-start sm:flex
        w-full justify-center hidden
        bg-linear-to-r/oklab from-primary
        flex-row items-center gap-1
        rounded-md inset-ring-b-2 inset-ring-background p-2"
      >
        <p class="w-full">
          {{"chats_main.messages" | translate}} - {{"chats_main.you_buy" | translate}}
        </p>
      </button>
    </div>
  }
  <div class="flex-1 flex items-stretch">
    <!--
      This needs to be this weird way for this part
      otherwise UI doesn't update for some reason
        - [perspective]="viewAs()" change is not being detected
    -->
    @if(viewAs() === "Seller") {
      <app-chat-list [specificListingId]="productId()" perspective="Seller" class="w-full"/>
    } @else {
      <app-chat-list [specificListingId]="productId()" perspective="Buyer" class="w-full"/>
    }

  </div>
</div>
