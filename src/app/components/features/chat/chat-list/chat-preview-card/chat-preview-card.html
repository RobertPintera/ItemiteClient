<div class="flex border-transparent border-t-2 border-b-2 relative shadow-md flex-col rounded-md m-4 p-2 hover:border-secondary transition-all duration-100 ease-out hover:cursor-pointer"
  [class.bg-primary]="selected() && !isArchived()"
  [class.text-primary-foreground]="selected() && !isArchived()"
  [class.bg-background]="!selected() || isArchived()"
  [class.text-foreground]="!selected() || isArchived()"
  (click)="OnClicked()"
>
  @if(unreadMessages() > 0) {
    <div class="absolute flex self-start flex-row items-center rounded-full bg-background/85 aspect-square p-[1px]">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
           class="size-6 text-[rgb(255,150,0)]">
        <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
      </svg>
      <p class="font-bold text-lg text-foreground">
        {{ unreadMessages() }}
      </p>
    </div>
  }

  <div class="relative flex flex-row items-center border-b-2">
    <img alt="listing image" [src]="mainImageUrl()"
         class="w-20 aspect-square object-contain" />

    @if (isArchived()) {
      <p class="absolute self-start -right-3 top-2 m-0 p-0
       text-secondary z-0 opacity-30 text-wrap wrap-anywhere text-xl text-center rotate-45 overflow-hidden">
        Archived
      </p>
    }

    <div class="flex relative flex-wrap flex-1 justify-center text-center flex-col items-center">
      <p class="z-2 text-xl mr-2 text-wrap wrap-anywhere">
        {{ listingName() }} - {{ price() }}
      </p>
      <p class="text-xl">
        {{ otherMember() }}
      </p>
    </div>
  </div>

  <p class="text-sm max-w-full self-center overflow-ellipsis overflow-hidden text-nowrap">
    {{lastMessageAuthor()}}: {{ lastMessage() }}
  </p>
</div>
