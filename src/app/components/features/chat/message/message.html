<div
    class="flex p-1 rounded-md flex-col grow-0 sm:max-w-[90%] max-w-full w-fit ml-5 mr-5 mt-2 text-card-foreground"
    [class.justify-self-start]="!isOwnMessage()"
    [class.justify-self-end]="isOwnMessage()"
    id="parent"
>
    <div class="flex flex-row gap-1 items-start">
        <!-- profile pic -->
        <img alt="profile" [src]="profileImage()"
             class="h-14 mt-1 rounded-full shadow-[0_0_10px_rgba(0,0,0,0.25)]
                dark:shadow-[0_0_10px_rgba(10,10,10,0.5)] object-cover aspect-square"
             [class.order-1]="isOwnMessage()"
        />

        <div class="flex flex-col">
            <!-- Username -->
            <div
                [class.self-start]="!isOwnMessage()"
                [class.self-end]="isOwnMessage()"
                class="flex flex-row items-center"
            >
                @if(isOwnMessage()) {
                    <div id="edit" class="flex flex-row text-card-foreground items-center">
                        <button (click)="OnEditClicked()"
                          class="h-full hover:text-primary hover:cursor-pointer">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
                                <path d="M21.731 2.269a2.625 2.625 0 0 0-3.712 0l-1.157 1.157 3.712 3.712 1.157-1.157a2.625 2.625 0 0 0 0-3.712ZM19.513 8.199l-3.712-3.712-12.15 12.15a5.25 5.25 0 0 0-1.32 2.214l-.8 2.685a.75.75 0 0 0 .933.933l2.685-.8a5.25 5.25 0 0 0 2.214-1.32L19.513 8.2Z" />
                            </svg>
                        </button>
                        <button (click)="OnDeleteClicked()"
                          class="h-full hover:text-primary text-card-foreground hover:cursor-pointer">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
                                <path fill-rule="evenodd" d="M16.5 4.478v.227a48.816 48.816 0 0 1 3.878.512.75.75 0 1 1-.256 1.478l-.209-.035-1.005 13.07a3 3 0 0 1-2.991 2.77H8.084a3 3 0 0 1-2.991-2.77L4.087 6.66l-.209.035a.75.75 0 0 1-.256-1.478A48.567 48.567 0 0 1 7.5 4.705v-.227c0-1.564 1.213-2.9 2.816-2.951a52.662 52.662 0 0 1 3.369 0c1.603.051 2.815 1.387 2.815 2.951Zm-6.136-1.452a51.196 51.196 0 0 1 3.273 0C14.39 3.05 15 3.684 15 4.478v.113a49.488 49.488 0 0 0-6 0v-.113c0-.794.609-1.428 1.364-1.452Zm-.355 5.945a.75.75 0 1 0-1.5.058l.347 9a.75.75 0 1 0 1.499-.058l-.346-9Zm5.48.058a.75.75 0 1 0-1.498-.058l-.347 9a.75.75 0 0 0 1.5.058l.345-9Z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>
                }
                <p class="font-bold text-shadow-sm text-shadow-accent">{{username()}}</p>
            </div>

            <!-- Message content -->
            @if(content()) {
                <p class="p-1 rounded-lg text-secondary-foreground bg-secondary">
                    {{content()}}
                </p>
            }
            <!-- Images -->
            @if(hasPhotos()) {
                <div class="flex rounded-lg w-fit max-w-full flex-row gap-1 mt-1 flex-wrap "
                     [class.self-start]="!isOwnMessage()"
                     [class.self-end]="isOwnMessage()"
                     [class.justify-end]="isOwnMessage()"
                >
                @for(photoResponse of photos(); track photoResponse.photoId) {
                    <a class="cursor-pointer" (click)="onImageClicked.emit(photoResponse.url)">
                        <img
                            alt="user photo"
                            [src]="photoResponse.url"
                            class="max-w-full w-fit object-contain rounded-sm min-h-20 sm:min-h-40
                                min-w-[min(calc(var(--spacing)*40,100%))] max-h-60"
                        />
                    </a>
                }
                </div>
            }
            <!-- dates -->
            <p class="text-xs flex flex-row text-wrap"
               [class.text-right]="isOwnMessage()"
               [class.self-end]="isOwnMessage()"
            >
                Sent {{dateSent()}}

                @if(dateModified()) { | modified {{dateModified()}}}
            </p>
        </div>
    </div>
</div>
