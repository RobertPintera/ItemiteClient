<app-external-configs-layout>
  <form [formGroup]="form" (ngSubmit)="OnSubmit()"
    class="flex z-1 justify-center flex-col p-5 items-center shadow-primary shadow-2xl m-auto w-full max-w-2xl h-fit bg-card text-card-foreground rounded-xl">
    <p class="text-4xl flex-wrap font-bold text-center">
      {{"login_register.reset_password" | translate}}
    </p>

    @if (successfullyChanged()) {
      <p class="text-2xl flex-wrap text-center bg-secondary text-secondary-foreground p-1 rounded-md mt-2 mb-2">
        {{"user_edition.password_changed" | translate}}
      </p>
    }

    <label for="passwordR" class="w-full">
      <app-scaled-text [text]="'user_edition.new_password' | translate" [step]="-1" base="text-sm" [maxGrowTimes]="2"/>
      @if(hasPasswordErrors()) {
        <div class="text--destructive"> {{passwordErrors()[0]}} </div>
      }
    </label>
    <input class="w-full h-12 sm:h-10 border-solid p-1 rounded-lg m-0 mb-2 border-(--input) text-(--muted-foreground) focus:border-(--ring) border-1"
           name="passwordR" id="passwordR" type="password" formControlName="password"
    />

    <label for="repeatPassword" class="w-full">
      <app-scaled-text [text]="'user_edition.repeat_new_password' | translate" [step]="-1"
                       base="text-sm" [maxGrowTimes]="2"/>
      @if(!repeatPassMatch()) {<div class="text-destructive">{{"validator_errors.pass_match" | translate}}</div>}
    </label>
    <input class="w-full h-12 sm:h-10 border-solid p-1 rounded-lg m-0 mb-2 border-(--input) text-(--muted-foreground) focus:border-(--ring) border-1"
           name="repeatPassword" id="repeatPassword" type="password" formControlName="repeatPassword"
    />

    <button [disabled]="formHasErrors()"
            (click)="OnSubmit()"
            type="submit"
            class="relative disabled:cursor-default disabled:bg-(--primary)/40 disabled:border-0
                enabled:cursor-pointer h-15 sm:h-10 p-1 flex-wrap mt-3 w-fit max-w-full rounded-md bg-(--primary) enabled:hover:bg-(--primary)/90 border-1 text-(--primary-foreground) border-(--ring) focus:border-(--ring) text-xl md:text-2xl" >
      {{ 'user_edition.edit_password' | translate }}
      @if(processing()) {
        <div class="absolute inset-0 flex items-center w-full justify-center">
          <app-loading-circle />
        </div>
      }
    </button>
  </form>
</app-external-configs-layout>
