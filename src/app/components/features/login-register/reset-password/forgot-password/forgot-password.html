<div class="absolute m-auto inset-0 flex items-center justify-center backdrop-blur-2xl backdrop-grayscale-100">
  <div class="absolute z-10 w-full h-full max-w-7xl p-10 rounded-lg bg-background/80 text-foreground">

    <form class="flex flex-col items-center justify-center sm:w-80 w-full max-w-80" [formGroup]="form" (ngSubmit)="onSubmit()">
      <label for="email" class="w-full mt-10">
        <app-scaled-text text='Email' [step]="-1" base="text-sm" [maxGrowTimes]="2"/>
        @if(hasEmailErrors()) { <div class="text-(--destructive)">{{emailErrors()[0]}}</div> }
      </label>
      <input class="w-full h-12 sm:h-10 border-solid p-1 rounded-lg m-0 mb-2 border-(--input) text-(--muted-foreground) focus:border-(--ring) border-1"
             name="email" id="email" type="email" formControlName="email"
      />
      <button [disabled]="formHasErrors()"
              type="submit"
              class="disabled:cursor-default disabled:bg-(--primary)/40 disabled:border-0
                enabled:cursor-pointer h-15 sm:h-10 mt-3 w-fit rounded-md bg-(--primary) enabled:hover:bg-(--primary)/90 border-1 text-(--primary-foreground) border-(--ring) focus:border-(--ring) text-xl md:text-2xl" >
        {{ 'login_register.password_reset_link' | translate }}
      </button>
    </form>

  </div>
</div>
