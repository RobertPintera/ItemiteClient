<div class="absolute inset-0 flex items-center justify-center backdrop-blur-sm z-5 w-full h-full max-w-[1920px] m-auto appear">
  <div class="absolute max-w-[min(90%,var(--container-7xl))] flex flex-col m-auto h-fit p-10 items-center shadow-xl/10 shadow-(color:--primary) rounded-lg bg-background/80 text-foreground">

    <button (click)="OnExitClicked()"
            class="hover:cursor-pointer hover:bg-primary/80
        absolute m-2 w-fit h-fit inset-y-0 text-primary-foreground bg-primary rounded-full right-0 block ">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-10">
        <path fill-rule="evenodd" d="M5.47 5.47a.75.75 0 0 1 1.06 0L12 10.94l5.47-5.47a.75.75 0 1 1 1.06 1.06L13.06 12l5.47 5.47a.75.75 0 1 1-1.06 1.06L12 13.06l-5.47 5.47a.75.75 0 0 1-1.06-1.06L10.94 12 5.47 6.53a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" />
      </svg>
    </button>

    @if(performedSuccessfulRequest()) {
      <p class="text-xl sm:text-2xl text-center mt-10 mb-1">
        {{"login_register.confirm_link" | translate}}
      </p>
      <p class="text-xl sm:text-2xl text-center mb-5">
        {{"login_register.can_close_window" | translate}}
      </p>
    } @else {
      <p class="text-center text-2xl mt-5">{{ 'login_register.password_reset_link' | translate }}</p>
      <form class="flex flex-col items-center justify-center sm:w-80 w-full max-w-80" [formGroup]="form" (ngSubmit)="OnSubmit()">
        <label for="email" class="w-full mt-5">
          <app-scaled-text text='Email' [step]="-1" base="text-sm" [maxGrowTimes]="2"/>
          @if(hasEmailErrors()) { <div class="text-(--destructive)">{{emailErrors()[0]}}</div> }
        </label>
        <div class="flex flex-row items-center w-full mt-3 mb-2">
          <input class="flex-1 h-12 sm:h-10 border-solid p-1 grow rounded-lg m-0 border-(--input) text-(--muted-foreground) focus:border-(--ring) border-1"
                 name="email" id="email" type="email" formControlName="email"
          />
          <button [disabled]="formHasErrors()"
                  type="submit"
                  class="disabled:cursor-default disabled:bg-primary/40 disabled:border-0 enabled:cursor-pointer
           min-h-full h-full aspect-square p-1 bg-primary enabled:hover:bg-primary/90 border-1 flex items-center text-center justify-center text-primary-foreground rounded-full focus:border--ring text-xl md:text-2xl"
          >
            @if(isProcessing()) {
              <div class="absolute inset-0 flex items-center w-full justify-center">
                <app-loading-circle />
              </div>
            }
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-8 max-h-full aspect-square">
              <path d="M3.478 2.404a.75.75 0 0 0-.926.941l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.404Z" />
            </svg>

          </button>
        </div>
      </form>
    }
  </div>
</div>
