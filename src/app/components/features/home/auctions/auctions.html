<section class="flex flex-col items-center gap-8">
  <h1>{{'newest_products.header' | translate}}</h1>
  <ul class="flex flex-col items-center w-full">
    @for (product of products; track product.id){
      <li class="w-1/1 h-96 px-4 my-4 flex-shrink-0">
        <div class="flex flex-col border-1 rounded-2xl w-full h-full">
          <h2>{{ product.name }}</h2>
          <div class="flex flex-row items-center h-full">
            <img [ngSrc]="product.image" [alt]="product.name" class="w-1/2" width="1" height="1">
            <div class="flex flex-col gap-2 p-2">
              <p class="text-3xl">{{ product.price }} $</p>
              <p class="text-lg">{{ product.isNegotiable ? "negotiable" : "" }}</p>
            </div>
          </div>
        </div>
      </li>
    }
  </ul>
</section>
