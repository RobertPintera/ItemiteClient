<section class="flex flex-col items-center gap-8 mx-8">
  <h1>{{'auctions.header' | translate}}</h1>
  <app-carousel [items]="firstHalfAuctions()" [visibleSm]="1">
    <ng-template let-auction>
      <app-auction-card [auction]="auction" />
    </ng-template>
  </app-carousel>
  <app-carousel [items]="secondHalfAuctions()" [visibleSm]="1">
    <ng-template let-auction>
      <app-auction-card [auction]="auction" />
    </ng-template>
  </app-carousel>
</section>
