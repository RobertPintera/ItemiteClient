<section class="flex flex-col items-center gap-8">
  <h1>{{'dedicated_products.header' | translate}}</h1>
  <app-carousel [items]="products" [visibleSm]="2" [visibleMd]="3" [visibleLg]="4" [visibleXl]="5">
    <ng-template let-product>
      <app-product-card [product]="product"/>
    </ng-template>
  </app-carousel>
</section>
