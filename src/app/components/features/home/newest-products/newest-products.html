<section class="flex flex-col items-center gap-8">
  <h1>{{'newest_products.header' | translate}}</h1>
  <app-carousel [items]="products.slice(0, products.length / 2)" [visibleSm]="2" [visibleXl]="3">
    <ng-template let-product>
      <app-product-card [product]="product"/>
    </ng-template>
  </app-carousel>
  <app-carousel [items]="products.slice(products.length / 2)" [visibleSm]="2" [visibleXl]="3">
    <ng-template let-product>
      <app-product-card [product]="product"/>
    </ng-template>
  </app-carousel>
</section>
