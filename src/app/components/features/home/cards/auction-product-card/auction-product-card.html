<div class="flex flex-col border-1 rounded-2xl w-full h-96 p-0 sm:p-4 lg:p-0 xl:p-4">
  @if (isRow()) {
    <p class="text-xl">{{ product()?.name  }}</p>
  }
  <div class="flex h-full overflow-hidden
    flex-col
    sm:flex-row sm:items-center
    lg:flex-col lg:items-start
    xl:flex-row xl:items-center
  ">
    <div class="relative w-full h-[60%]
         sm:h-[90%]
         lg:h-[60%]
         xl:h-[90%]">
      <img [ngSrc]="product()?.image || 'assets/laptop_chromebook_icon.svg'" [alt]="product()?.name"
           class="object-contain h-full w-full select-none drag-none" draggable="false" fill>
    </div>
    <div class="flex flex-col items-center w-full
      sm:gap-2 sm:px-4
      lg:gap-0 lg:px-0
      xl:gap-2 xl:px-4">
      @if (!isRow()) {
        <p class="text-lg">{{ product()?.name }}</p>
      }
      @for (item of info(); track item.id ){
        <div class="flex items-center text-center
          flex-row
          sm:flex-col
          lg:flex-row
          xl:flex-col">
          <p class="text-base
          sm:text-lg
          lg:text-base
          xl:text-lg">{{ item.label }}</p>
          <p class="text-base block
          sm:text-lg sm:hidden
          lg:text-base lg:block
          xl:text-lg xl:hidden">:</p>
          <p class="text-base
          sm:text-lg sm:px-4
          lg:text-base lg:px-2
          xl:text-lg xl:px-4">{{ item.value }}</p>
        </div>
      }
    </div>
  </div>
</div>
