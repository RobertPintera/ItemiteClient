<div class="flex flex-col border-1 rounded-2xl w-full h-96 p-4">
  @if (isXl()) {
    <h2>{{ product()?.name  }}</h2>
  }
  <div class="flex flex-col sm:flex-row sm:items-center h-full overflow-hidden ">
    <img [ngSrc]="product()?.image || 'assets/laptop_chromebook_icon.svg'" [alt]="product()?.name"
         class="w-full h-[60%] self-start
         sm:w-1/2 sm:h-auto sm:max-h-[90%] sm:self-auto
         object-contain flex-shrink-0 select-none drag-none"
         draggable="false" width="1" height="1">
    <div class="flex flex-col sm:gap-2 sm:px-8">
      @if (!isXl()) {
        <p class="text-2xl">{{ product()?.name }}</p>
      }
      <div class="flex flex-row sm:flex-col">
        <p class="text-lg sm:text-2xl">Bidders number</p>
        <p class="text-lg block sm:hidden">:</p>
        <p class="text-lg sm:text-2xl px-2 sm:px-4">{{ product()?.biddersNumber }}</p>
      </div>
      <div class="flex flex-row sm:flex-col">
        <p class="text-lg sm:text-2xl">Current price</p>
        <p class="text-lg block sm:hidden">:</p>
        <p class="text-lg sm:text-2xl px-2 sm:px-4">{{ product()?.highestPrice }}</p>
      </div>
      <div class="flex flex-row sm:flex-col">
        <p class="text-lg sm:text-2xl">Auction end date</p>
        <p class="text-lg block sm:hidden">:</p>
        <p class="text-lg sm:text-2xl px-2 sm:px-4">{{ product()?.endDate }}</p>
      </div>
    </div>
  </div>
</div>
