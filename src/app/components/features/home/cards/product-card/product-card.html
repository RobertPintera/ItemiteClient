<div class="flex flex-col border-1 rounded-2xl w-full h-96">
  <div class="relative w-full h-[60%]">
    <img [ngSrc]="product()?.image ?? 'assets/laptop_chromebook_icon.svg'" [alt]="product()?.name"
         class="object-fit w-full h-full select-none drag-none" draggable="false" fill>
  </div>
  <div class="flex flex-col gap-2 p-2">
    <p class="text-xl">{{ product()?.price }} $</p>
    <p class="text-base">{{ product()?.isNegotiable ? "negotiable" : "" }}</p>
    <p class="text-base">{{ product()?.name }}</p>
  </div>
</div>
