<a routerLink="/product" [queryParams]="{ id: product()?.id, type: product()?.listingType }"
   class="flex flex-col bg-card text-card-foreground border-2 border-border rounded-2xl w-full my-2 h-120 overflow-hidden
   hover:rounded-xl hover:shadow-xl hover:z-10 hover:scale-[1.02] duration-150">
  <div class="relative w-full h-[60%]">
    <img [src]="product()?.mainImageUrl ?? 'assets/laptop_chromebook_icon.svg'" [alt]="product()?.name"
         class="object-contain w-full h-full select-none drag-none" draggable="false">
  </div>
  <div class="flex flex-col p-2 mt-2 gap-2">
    <p class="text-2xl">{{ product()?.name }}</p>
    <div class="flex flex-row">
      @if(product()?.categories?.length){
        <div class="border-2 border-border px-4 py-2 rounded-2xl bg-background text-foreground">
          <p class="text-sm">{{ product()?.categories?.[0]?.name }}</p>
        </div>
      }
    </div>
    <div class="flex flex-col">
      <p class="text-xl">{{'product_details.price' | translate}}: {{ product()?.price }} $</p>
      <p class="text-base">{{ product()?.isNegotiable ? "negotiable" : "\u00A0" }}</p>
    </div>
  </div>
</a>
