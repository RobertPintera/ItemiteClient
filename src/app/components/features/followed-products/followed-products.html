<div class="flex m-auto flex-col max-w-7xl w-full py-4 px-8 gap-4">
  <h1>{{ 'followed_products.header' | translate }}</h1>
  @if(loading()){
    <div class="flex justify-center py-16 w-full">
      <app-loader/>
    </div>
  } @else if (totalPages() === 0){
    <div class="flex justify-center py-16 w-full">
      <h2>Can't find any article. Follow your first product!</h2>
    </div>
  }
  @else {
    <div class="w-full flex py-4 justify-end">
      <app-paginator [isBlocked]="isBlocked()" [pageNumber]="filter().pageNumber" [totalPages]="totalPages()" (pageChange)="usePaginator($event)"/>
    </div>
    <div class="flex flex-col w-full">
      @let data = listings();

      @if(data && data.items.length){
        @for (product of data.items; track product.id){
          <app-product-item [product]="product" [isMd]="isMd()"/>
        }
      }
    </div>
    <div class="w-full flex py-4 justify-end">
      <app-paginator [isBlocked]="isBlocked()" [pageNumber]="filter().pageNumber" [totalPages]="totalPages()" (pageChange)="usePaginator($event)"/>
    </div>
  }
</div>
