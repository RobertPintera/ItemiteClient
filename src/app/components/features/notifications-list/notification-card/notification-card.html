

<div
  class="w-full relative mt-2 rounded-md box-border h-fit ring-ring ring-2
text-secondary-foreground p-2 text-shadow-xs text-shadow-black bg-linear-to-r from-secondary to-transparent hover:cursor-pointer hover:ring-chart-1 shadow-white hover:shadow-2xs transition-all duration-200"
  [class.from-secondary]="readAt() !== null"
  [class.from-amber-600]="readAt() === null"
>

  <div (click)="OnDeleteClicked()"
    class="hover:text-amber-600 absolute h-fit z-2 text-secondary-foreground right-0">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-8 shrink-0">
      <path fill-rule="evenodd" d="M16.5 4.478v.227a48.816 48.816 0 0 1 3.878.512.75.75 0 1 1-.256 1.478l-.209-.035-1.005 13.07a3 3 0 0 1-2.991 2.77H8.084a3 3 0 0 1-2.991-2.77L4.087 6.66l-.209.035a.75.75 0 0 1-.256-1.478A48.567 48.567 0 0 1 7.5 4.705v-.227c0-1.564 1.213-2.9 2.816-2.951a52.662 52.662 0 0 1 3.369 0c1.603.051 2.815 1.387 2.815 2.951Zm-6.136-1.452a51.196 51.196 0 0 1 3.273 0C14.39 3.05 15 3.684 15 4.478v.113a49.488 49.488 0 0 0-6 0v-.113c0-.794.609-1.428 1.364-1.452Zm-.355 5.945a.75.75 0 1 0-1.5.058l.347 9a.75.75 0 1 0 1.499-.058l-.346-9Zm5.48.058a.75.75 0 1 0-1.498-.058l-.347 9a.75.75 0 0 0 1.5.058l.345-9Z" clip-rule="evenodd" />
    </svg>
  </div>

  <div (click)="OnClicked()">
    <p class="text-sm text-center w-full">
      {{notificationSent() | date:"yyyy/MM/dd HH:mm"}}
    </p>

    @if (readAt() === null) {
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6 absolute inset-0 ">
        <path d="M5.85 3.5a.75.75 0 0 0-1.117-1 9.719 9.719 0 0 0-2.348 4.876.75.75 0 0 0 1.479.248A8.219 8.219 0 0 1 5.85 3.5ZM19.267 2.5a.75.75 0 1 0-1.118 1 8.22 8.22 0 0 1 1.987 4.124.75.75 0 0 0 1.48-.248A9.72 9.72 0 0 0 19.266 2.5Z" />
        <path fill-rule="evenodd" d="M12 2.25A6.75 6.75 0 0 0 5.25 9v.75a8.217 8.217 0 0 1-2.119 5.52.75.75 0 0 0 .298 1.206c1.544.57 3.16.99 4.831 1.243a3.75 3.75 0 1 0 7.48 0 24.583 24.583 0 0 0 4.83-1.244.75.75 0 0 0 .298-1.205 8.217 8.217 0 0 1-2.118-5.52V9A6.75 6.75 0 0 0 12 2.25ZM9.75 18c0-.034 0-.067.002-.1a25.05 25.05 0 0 0 4.496 0l.002.1a2.25 2.25 0 1 1-4.5 0Z" clip-rule="evenodd" />
      </svg>
    }

    <div>
      <p class="font-bold text-lg"> {{ `notifications.${resourceType()}` | translate }} </p>
      <p class="text-wrap-auto text-wrap text-justify text-lg"> {{ message() }} </p>
      @if(notificationImageUrl() !== null) {
        <img alt="Notification image" [src]="notificationImageUrl()" class="w-full aspect-square object-contain max-h-50"/>
      }
    </div>
  </div>


</div>
