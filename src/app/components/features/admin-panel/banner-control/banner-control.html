<div class="flex m-auto flex-col max-w-7xl w-full py-4 px-8 gap-4">
  <h1>{{ 'Banners'}}</h1>
  <div class="w-full flex justify-between py-4 gap-2 flex-wrap">
    <app-button [label]="'admin_banner_control.create' | translate" (clickButton)="openBannerDialog()"/>
  </div>
  @if(loading()){
    <div class="flex justify-center py-16 w-full">
      <app-loader/>
    </div>
  } @else if (!banners().length){
    <div class="flex justify-center py-16 w-full">
      <h2>{{'admin_banner_control.no_banners' | translate}}</h2>
    </div>
  }
  @else {
    <div class="flex flex-col w-full">
      @let data = banners();

      @if(data && data.length){
        @for (banner of data; track banner.id){
          <app-banner-item [banner]="banner" (successAction)="refreshCategories()"/>
        }
      }
    </div>
  }
</div>
<app-banner-dialog [(isOpen)]="isOpenBannerDialog" (operationSuccess)="refreshCategories()"/>
