<div class="flex m-auto flex-col max-w-7xl w-full py-4 px-8 gap-4">
  <h1>Categories</h1>
  <div class="w-full flex justify-between py-4 gap-2 flex-wrap">
    <app-button [label]="'admin_category_control.create_main_category' | translate" (clickButton)="openDialog()"/>
  </div>
  <div class="flex flex-row flex-wrap justify-center">
    @for(category of categories(); track category.id) {
      <div class="flex bg-card text-card-foreground flex-col w-full border-2 border-transparent border-b-border shadow-xl p-4
        hover:border-border hover:rounded-xl hover:z-10 hover:scale-[1.02]
        duration-150">
        <div class="flex flex-row gap-4">
          <div class="flex">
            <div class="size-20 svg-host" [innerHTML]="category.safeSvg"></div>
          </div>
          <div class="flex flex-col">
            <h3>{{ category.name }}</h3>
            <p class="text-xl">{{ category.description }}</p>
          </div>
        </div>
        <div class="flex flex-wrap justify-between gap-2 mt-4">
          <app-button [label]="'admin_category_control.show_subcategories' | translate" severity="secondary"/>
          <div class="flex flex-wrap gap-2">
            <app-button [label]="'controls.delete' | translate" severity="danger" (clickButton)="openDeleteDialog(category.id)"/>
            <app-button [label]="'controls.edit' | translate" (clickButton)="openDialog(category)"/>
          </div>
        </div>
      </div>
    }
  </div>
</div>
@if(loading()){
  <app-loading-dialog/>
}
@else if(isOpenDialog()){
  <app-main-category-dialog [(isOpen)]="isOpenDialog" [editedCategory]="editedCategory()" (operationSuccess)="refreshCategories()"/>
}
@else if(isOpenDeleteDialog()){
  <app-confirm-dialog (onCancelClicked)="closeDeleteDialog()" (onConfirmClicked)="confirmDeleteCategory()"/>
}
