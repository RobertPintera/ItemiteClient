@if(isOpen()){
  @if(loading()){
    <app-loading-dialog/>
  } @else {
    <app-dialog [header]="'product_details.individual_pricing' | translate" (closed)="closeDialog()">
      <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-2">
        <label for="userId" class="text-xl font-semibold">{{'product_details.user_id' | translate}}</label>
        <app-input-number id="price" [step]="1" [decimalPlaces]="0" [max]="null" formControlName="price" required/>

        <label for="price" class="text-xl font-semibold">{{'product_details.price' | translate}}</label>
        <app-input-number id="price" [max]="100000000" formControlName="price" required/>

        <div class="flex flex-row justify-between gap-2">
          <app-button type="button" [label]="'controls.cancel' | translate" severity="accent" variant="outlined" (clickButton)="closeDialog()"/>
          <app-button type="submit" [label]="'controls.save' | translate"/>
        </div>
      </form>
    </app-dialog>
  }
}
