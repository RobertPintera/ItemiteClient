@if(isOpen()){
  @if(loading()){
    <app-loading-dialog/>
  } @else {
    <app-dialog [header]="'product_details.individual_pricing' | translate" (closed)="closeDialog()">
      <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-2 w-[100vw] max-w-full sm:max-w-sm">
        <div class="flex flex-row justify-between gap-2">
          <app-button type="button" [label]="'controls.cancel' | translate" severity="accent" variant="outlined" (clickButton)="closeDialog()"/>
          <app-button type="submit" [label]="'controls.delete' | translate" severity="danger"/>
        </div>
      </form>
    </app-dialog>
  }
}
