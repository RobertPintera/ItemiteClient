<a [routerLink]="route()" class="flex flex-row items-center justify-between p-3 inset-shadow-2xs
    hover:cursor-pointer transition-all duration-75 peer w-full min-h-fit h-18 sm:h-fit select-none"
   (click)="OnClicked()"
>
  <ng-content />
  <p class="text-wrap text-wrap-auto text-right wrap-anywhere"> {{text()}} </p>
</a>

<div class="w-full scale-0 border-b peer-hover:scale-100 transition-all duration-300 origin-center"></div>
