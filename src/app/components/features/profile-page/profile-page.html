<div class="flex justify-self-center flex-col max-w-7xl shrink-1 w-full text-foreground bg-background p-5">
  <div class="flex flex-row space-x-10 items-center shadow-md p-4 bg-card text-card-foreground">
    <img class="max-w-1/3 border-2 rounded-full max-h-100  aspect-square object-contain" alt="Profile picture" src="https://d3npyywa6qnolf.cloudfront.net/prod/user/630328/eyJ1cmwiOiJodHRwczpcL1wvcGF0cm9uaXRlLnBsXC91cGxvYWRcL3VzZXJcLzYzMDMyOFwvYXZhdGFyX29yaWcuanBnPzE3NDcwNDQ4MjUiLCJlZGl0cyI6eyJyZXNpemUiOnsid2lkdGgiOjI5MCwib3B0aW9ucyI6eyJxdWFsaXR5Ijo5NX19LCJ0b0Zvcm1hdCI6ImpwZWcifX0%3D/aMG9oAyu68ANenpEWsUKHOH1iO5vPjoIszdKFl2AB5I%3D"/>
    <div class="flex flex-col">
      <div class="relative italic text-2xl md:text-3xl lg:text-4xl flex flex-col w-full justify-start text-start items-center">
        <app-editable-text
          [text]="userName()"
          [validators]="usernameValidators"
          [verticalLayout]="true"
          (onEdit)="UpdateUsername($event)
        "/>
      </div>
    </div>
  </div>

  <div class="ml-5 flex justify-end flex-row">
    <button class="rounded-md hover:underline shadow-md shadow-(color:--secondary) cursor-pointer p-1 flex text-start flex-row items-center w-fit">
      <div class="text-sm sm:text-lg">Delete image</div>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="bg-destructive text-destructive-foreground rounded-r-md size-6 p-1 h-fit">
        <path fill-rule="evenodd" d="M16.5 4.478v.227a48.816 48.816 0 0 1 3.878.512.75.75 0 1 1-.256 1.478l-.209-.035-1.005 13.07a3 3 0 0 1-2.991 2.77H8.084a3 3 0 0 1-2.991-2.77L4.087 6.66l-.209.035a.75.75 0 0 1-.256-1.478A48.567 48.567 0 0 1 7.5 4.705v-.227c0-1.564 1.213-2.9 2.816-2.951a52.662 52.662 0 0 1 3.369 0c1.603.051 2.815 1.387 2.815 2.951Zm-6.136-1.452a51.196 51.196 0 0 1 3.273 0C14.39 3.05 15 3.684 15 4.478v.113a49.488 49.488 0 0 0-6 0v-.113c0-.794.609-1.428 1.364-1.452Zm-.355 5.945a.75.75 0 1 0-1.5.058l.347 9a.75.75 0 1 0 1.499-.058l-.346-9Zm5.48.058a.75.75 0 1 0-1.498-.058l-.347 9a.75.75 0 0 0 1.5.058l.345-9Z" clip-rule="evenodd" />
      </svg>
    </button>
    <button class="rounded-md hover:underline shadow-md shadow-(color:--secondary) cursor-pointer p-1 flex text-start flex-row items-center w-fit">
      <div class="text-sm sm:text-lg">Edit image</div>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="bg-accent text-accent-foreground rounded-r-md size-6 p-1 h-fit">
        <path d="M21.731 2.269a2.625 2.625 0 0 0-3.712 0l-1.157 1.157 3.712 3.712 1.157-1.157a2.625 2.625 0 0 0 0-3.712ZM19.513 8.199l-3.712-3.712-12.15 12.15a5.25 5.25 0 0 0-1.32 2.214l-.8 2.685a.75.75 0 0 0 .933.933l2.685-.8a5.25 5.25 0 0 0 2.214-1.32L19.513 8.2Z" />
      </svg>
    </button>
  </div>

  <p id="details" class="text-2xl md:text-3xl lg:text-4xl">Details</p>
  <div class="text-base sm:text-xl ml-5 grid grid-custom items-center max-w-full sm:">
        <p>Email:</p>
        <app-editable-text [text]="email()" [validators]="emailValidators" (onEdit)="UpdateEmail($event)"/>

        <p>Phone nr:</p>
        <app-editable-text [text]="phone()" [validators]="phoneValidators" (onEdit)="UpdatePhone($event)"/>
  </div>

  <p id="localization" class="text-2xl md:text-3xl lg:text-4xl">Localization</p>
  <div class="text-base sm:text-xl ml-5 max-w-full grid items-center grid-custom">
      <p>Localization:</p>
      <div class="flex flex-row items-center flex-wrap break-all">
        <p class="mr-5">{{localization()}}</p>
        @if (displayUnsavedLocalization()) {
          <p class="text-destructive-foreground rounded-sm bg-destructive p-1 text-base">
            {{"controls.unsaved" | translate}}
          </p>
        }
      </div>
  </div>

  <!-- Localization buttons  -->
  <div class="ml-5 flex items-center flex-row">
    <button
      (click)="SwitchLocalizationEdition()"
      class="rounded-md hover:underline shadow-md shadow-(color:--secondary) cursor-pointer p-1 flex text-start flex-row items-center w-fit">
      <div class="text-sm sm:text-lg">
        @if (editLocalization()) {
          {{"controls.cancel" | translate}}
        } @else {
          {{"controls.enable_edition" | translate}}
        }
      </div>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="bg-accent rounded-r-md size-6 p-1 h-fit">
        <path d="M21.731 2.269a2.625 2.625 0 0 0-3.712 0l-1.157 1.157 3.712 3.712 1.157-1.157a2.625 2.625 0 0 0 0-3.712ZM19.513 8.199l-3.712-3.712-12.15 12.15a5.25 5.25 0 0 0-1.32 2.214l-.8 2.685a.75.75 0 0 0 .933.933l2.685-.8a5.25 5.25 0 0 0 2.214-1.32L19.513 8.2Z" />
      </svg>
    </button>

    @if (editLocalization()) {
      <button
        [disabled]="!tempLocIsValid()"
        (click)="UpdateLocalization()"
        class="disabled:bg-primary/50 disabled:text-primary-foreground/50 disabled:cursor-no-drop
        bg-primary text-primary-foreground rounded-md hover:underline shadow-md shadow-(color:--secondary) cursor-pointer p-1 flex text-start flex-row items-center w-fit ">
        <div class="text-sm sm:text-lg text-primary-foreground">
          {{"controls.save" | translate}}
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="text-primary-foreground size-6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
        </svg>
      </button>
    }
  </div>

  <!-- Geoapify -->
  <div [class.scale-y-full]="editLocalization()"
       [class.scale-y-0]="!editLocalization()"
       class="ml-5 flex
  transition-transform origin-top duration-300
">
    <app-geocoder-autocomplete placeHolder="Find city" class="flex-1" (onCityPicked)="UpdateTempLocalization($event)"/>
  </div>

  <!-- leaflet map -->
  <div id="map" class="h-100 rounded-md max-w-full ml-5 z-0"></div>

  <p id="security" class="text-2xl md:text-3xl lg:text-4xl">Security</p>

</div>
